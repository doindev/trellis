<div class="tag-selector-backdrop" (click)="onBackdropClick($event)">
  <div class="tag-selector-panel">
    <div class="tag-selector-header">
      <span class="tag-selector-title">Tags</span>
      <button class="tag-selector-close" (click)="closed.emit()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="tag-selector-search">
      <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input #searchInput
             type="text"
             [(ngModel)]="searchTerm"
             (keydown)="onSearchKeydown($event)"
             placeholder="Search or create tag..."
             autofocus>
    </div>

    @if (selectedTags.length > 0) {
      <div class="selected-tags">
        @for (tag of selectedTags; track tag.id) {
          <span class="selected-tag-pill">
            {{ tag.name }}
            <button class="pill-remove" (click)="removeTag(tag)">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </span>
        }
      </div>
    }

    <div class="tag-selector-list">
      @if (showCreateOption) {
        <button class="tag-list-item create-item" (click)="createTag()" [disabled]="creatingTag">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Create "{{ searchTerm.trim() }}"
        </button>
      }
      @for (tag of filteredTags; track tag.id) {
        <button class="tag-list-item" [class.selected]="isSelected(tag)" (click)="toggleTag(tag)">
          <span class="tag-check">
            @if (isSelected(tag)) {
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            }
          </span>
          <span class="tag-name">{{ tag.name }}</span>
        </button>
      }
      @if (filteredTags.length === 0 && !showCreateOption) {
        <div class="tag-empty">No tags found</div>
      }
    </div>
  </div>
</div>
