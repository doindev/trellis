<div class="main-header">
  <div class="top-menu">
    <div class="header-left">
      <button class="btn-icon" (click)="back.emit()" title="Back to workflows">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="breadcrumb-link" (click)="back.emit()">Personal</span>
      <span class="breadcrumb-sep">/</span>

      @if (editingName) {
        <input class="name-input"
               [(ngModel)]="nameInput"
               (blur)="saveName()"
               (keydown)="onKeydown($event)"
               autofocus>
      } @else {
        <span class="workflow-name" (click)="startEditName()" title="Click to rename">
          {{ workflowName }}
          @if (isDirty) {
            <span class="dirty-dot"></span>
          }
        </span>
      }

      <div class="tag-pills">
        @for (tag of tags; track tag.id) {
          <span class="tag-pill">{{ tag.name }}</span>
        }
        <button class="add-tag-btn" (click)="openTagSelector.emit()" title="Manage tags">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="header-right">
      <button class="publish-btn" [attr.data-status]="publishStatus" (click)="publish.emit()">
        <lucide-icon name="aperture" [size]="14"></lucide-icon>
        {{ published ? 'Publish (v' + currentVersion + ')' : 'Publish' }}
      </button>

      <div class="header-divider"></div>

      <button class="btn-icon save-status-btn"
              [class.saving]="isSaving"
              [class.dirty]="isDirty && !isSaving"
              [class.saved]="!isDirty && !isSaving"
              (click)="isSaving ? null : isDirty ? save.emit() : toggleVersions.emit()"
              [title]="isSaving ? 'Saving...' : isDirty ? 'Save workflow' : 'View version history'">
        @if (isSaving) {
          <lucide-icon name="clock-fading" [size]="18"></lucide-icon>
        } @else if (isDirty) {
          <lucide-icon name="clock-plus" [size]="18"></lucide-icon>
        } @else {
          <lucide-icon name="clock-check" [size]="18"></lucide-icon>
        }
      </button>

      <div class="more-menu-wrapper">
        <button class="btn-icon" title="More actions" (click)="toggleMenu()">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
        @if (showMenu) {
          <div class="more-menu">
            <button class="menu-item" (click)="onMenuAction('editDescription')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              Edit description
            </button>
            <button class="menu-item" (click)="onMenuAction('editMcpParams')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>
              </svg>
              Edit Schema parameters
            </button>
            <button class="menu-item" (click)="onMenuAction('duplicate')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
              Duplicate
            </button>
            <button class="menu-item" (click)="onMenuAction('download')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Download
            </button>
            <button class="menu-item" (click)="onMenuAction('rename')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
              </svg>
              Rename
            </button>
            <div class="menu-divider"></div>
            <button class="menu-item" (click)="onMenuAction('importFromUri')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
              </svg>
              Import from URI...
            </button>
            <button class="menu-item" (click)="onMenuAction('importFromFile')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
              </svg>
              Import from file...
            </button>
            <div class="menu-divider"></div>
            <button class="menu-item" (click)="onMenuAction('pushToGit')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 009 9"/>
              </svg>
              Push to git
            </button>
            <button class="menu-item" (click)="onMenuAction('settings')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
              </svg>
              Settings
            </button>
            @if (published) {
              <button class="menu-item" (click)="onMenuAction('unpublish')">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 7l-10 10"/><circle cx="12" cy="12" r="9"/>
                </svg>
                Unpublish
              </button>
            }
            <div class="menu-divider"></div>
            <button class="menu-item danger" (click)="onMenuAction('archive')">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/>
              </svg>
              Archive
            </button>
          </div>
        }
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn" [class.active]="activeTab === 'editor'" (click)="tabChanged.emit('editor')">Editor</button>
    <button class="tab-btn" [class.active]="activeTab === 'executions'" (click)="tabChanged.emit('executions')">Executions</button>
  </div>
</div>
