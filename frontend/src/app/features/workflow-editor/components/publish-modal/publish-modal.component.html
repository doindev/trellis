<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-panel">
    <div class="modal-header">
      <h3 class="modal-title">Publish Workflow</h3>
      <button class="modal-close" (click)="onCancel()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      @if (hasPinnedNodes) {
        <div class="pin-warning">
          <div class="pin-warning-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <div class="pin-warning-content">
            <div class="pin-warning-title">Pinned data detected</div>
            <div class="pin-warning-text">
              The following nodes have pinned output data and will be skipped during execution:
            </div>
            <ul class="pin-warning-list">
              @for (name of pinnedNodeNames; track name) {
                <li>{{ name }}</li>
              }
            </ul>
            <div class="pin-warning-checkbox">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="clearPinData"
                       [(ngModel)]="clearPinnedData">
                <label class="form-check-label" for="clearPinData">Clear pinned data before publishing</label>
              </div>
            </div>
          </div>
        </div>
      }

      <div class="form-group">
        <label class="form-label" for="versionName">Version name</label>
        <input class="form-input"
               id="versionName"
               type="text"
               [(ngModel)]="versionName"
               (keydown.enter)="onConfirm()"
               autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="description">Description <span class="optional">(optional)</span></label>
        <textarea class="form-textarea"
                  id="description"
                  [(ngModel)]="description"
                  rows="3"
                  placeholder="What changed in this version?"></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-publish" (click)="onConfirm()">Publish</button>
    </div>
  </div>
</div>
