# Server
server.port=5678

# H2 Database (dev) - PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:trellis;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.type.json_format_mapper=org.hibernate.type.format.jackson.JacksonJsonFormatMapper
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Suppress Chrome DevTools .well-known probe (404 noise)
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=false
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=ERROR

# Logging for debugging
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#logging.level.org.springframework.transaction=DEBUG

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# Trellis Configuration
trellis.encryption.key=change-me-in-production-32chars!
trellis.webhook.base-path=/webhook
trellis.webhook.test-base-path=/webhook-test

# Scheduling
spring.task.scheduling.pool.size=5

# Swagger / OpenAPI
springdoc.swagger-ui.url=/api/swagger/spec
springdoc.swagger-ui.path=/swagger-ui.html

### DO NOT REMOVE PROPERTIES STARTING WITH 'security'
security.enabled=false
security.debug=true
security.diagnostics.enabled=true
#security.dynamic-registration=true

#security.filter-chains[0].security-matcher.matchers=/**
#security.filter-chains[0].authorize.any-request.access=permitAll
#security.filter-chains[0].authorize.all.matchers=/**
#security.filter-chains[0].csrf.enabled=false
#security.filter-chains[0].cors.enabled=false

