# PostgreSQL Database (production)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cwc}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:cwc}
spring.datasource.password=${DB_PASSWORD:cwc}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# Override encryption key from environment
cwc.encryption.key=${CWC_ENCRYPTION_KEY:change-me-in-production-32chars!}
