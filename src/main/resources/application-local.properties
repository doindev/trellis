# Local-only startup profile: all config from .cwc directory, writeback enabled.
# On publish, workflows and project settings are written back to .cwc for persistence across restarts.
cwc.config.paths=.cwc
cwc.config.mode=seed
cwc.config.writeback=true
cwc.git.enabled=false

# CWC credential properties (auto-generated)
PERSONAL_OLLAMA_ACCOUNT_BASEURL=http://localhost:11434

