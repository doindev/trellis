apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cwc.fullname" . }}
  labels:
    {{- include "cwc.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cwc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cwc.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: cwc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            {{- if .Values.database.existingSecret }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: password
            {{- end }}
            {{- if .Values.encryptionKey.existingSecret }}
            - name: CWC_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.encryptionKey.existingSecret }}
                  key: key
            {{- end }}
            - name: CWC_CONFIG_PATHS
              value: {{ .Values.config.paths | quote }}
            - name: CWC_CONFIG_MODE
              value: {{ .Values.config.mode | quote }}
            {{- if .Values.config.git.enabled }}
            - name: CWC_GIT_ENABLED
              value: "true"
            - name: CWC_GIT_URL
              value: {{ .Values.config.git.url | quote }}
            - name: CWC_GIT_BRANCH
              value: {{ .Values.config.git.branch | quote }}
            {{- if .Values.config.git.tokenSecretName }}
            - name: CWC_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.git.tokenSecretName }}
                  key: {{ .Values.config.git.tokenSecretKey }}
            {{- end }}
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /opt/cwc/config
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
      volumes:
        - name: config
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
