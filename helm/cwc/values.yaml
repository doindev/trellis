replicaCount: 2

image:
  repository: ghcr.io/org/cwc
  tag: latest
  pullPolicy: IfNotPresent

config:
  mode: seed
  paths: /opt/cwc/config

  git:
    enabled: false
    url: ""
    branch: main
    syncOnStartup: true
    pollInterval: 0
    # Name of K8s Secret containing git token
    tokenSecretName: ""
    tokenSecretKey: token

database:
  host: postgresql
  port: 5432
  name: cwc
  # Name of K8s Secret with 'username' and 'password' keys
  existingSecret: cwc-db-credentials

encryptionKey:
  # Name of K8s Secret with 'key' key
  existingSecret: cwc-encryption-key

env: []

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: cwc.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
